# ANIMA Base Training Configuration
# ==================================

name: anima_base_training
seed: 42
device: auto  # auto, cuda, cpu
output_dir: outputs

# Model Configuration
model:
  variant: anima_zero  # anima_zero, anima_one, transformer
  sensory_dim: 8
  output_dim: 4
  target_params: 25000
  d_model: 32
  d_bottleneck: 16
  chunk_size: 4
  spectral_radius: 0.99

# Training Configuration
training:
  batch_size: 64
  epochs: 100
  max_steps: null  # Set to limit by steps instead of epochs
  lr: 0.001
  weight_decay: 0.0
  gradient_clip: 1.0
  warmup_steps: 100
  scheduler: cosine  # cosine, linear, constant, polynomial
  # Checkpointing
  checkpoint_every: 1000
  eval_every: 500
  log_every: 100
  # Early stopping
  early_stopping_patience: 10
  early_stopping_min_delta: 0.001

# Data Configuration
data:
  dataset: synthetic  # synthetic, pile, laion, webvid, etc.
  data_path: null
  streaming: true
  prefetch: 4
  num_workers: 4
  max_seq_len: 512
  train_samples: null  # null = use all
  val_samples: 1000
  test_samples: 1000

# Evaluation Configuration
eval:
  benchmarks:
    - reasoning
    - physics
  metrics:
    - accuracy
    - loss
  save_predictions: false

# Distributed Training (optional)
distributed: false
world_size: 1
local_rank: 0
