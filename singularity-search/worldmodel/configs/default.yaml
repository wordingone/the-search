# Genesis Default Configuration
# Target: 2.3B parameters, 720p @ 24 FPS

model:
  name: "genesis"
  version: "0.1.0"

# Video Tokenizer (160M params)
tokenizer:
  type: "causal_vae_3d"
  input_channels: 3
  latent_channels: 5          # Must match FSQ dim
  encoder_channels: [64, 128, 256, 512]
  decoder_channels: [512, 256, 128, 64]
  encoder_depths: [2, 2, 4, 4]
  decoder_depths: [4, 4, 2, 2]
  temporal_downsample: 4      # tau = 4
  spatial_downsample: 16      # 16x compression

  # FSQ quantization
  fsq:
    levels: [8, 6, 5, 5, 5]   # vocab = 6000
    dim: 5

# Action Encoder (20M params)
action:
  # Keyboard/mouse encoder
  encoder:
    keyboard_keys: 6          # WASD + Space + Shift
    mouse_dims: 2             # dx, dy
    action_dim: 64

  # Latent Action Model (unsupervised)
  lam:
    hidden_channels: [256, 128]
    fsq_levels: [8, 8, 8, 8, 8, 8, 8, 8]  # 8^8 = 16M actions
    variance_loss_weight: 0.1

# Conditioning (80M params, excluding frozen CLIP)
conditioning:
  text:
    model: "t5-small"         # 60M params
    hidden_dim: 512
    proj_dim: 1024

  image:
    model: "clip-vit-base-patch16"
    hidden_dim: 768
    proj_dim: 1024
    freeze: true              # Not counted in param budget

  initializer:
    deconv_channels: [1024, 512, 256, 128, 64]
    output_resolution: 64     # 64³ initial voxel grid
    top_k_voxels: 100000      # Sparsify to 100K voxels

# Dynamics Backbone (1.8B params)
dynamics:
  type: "autoregressive_transformer"
  layers: 32
  hidden_dim: 2048
  num_heads: 32
  head_dim: 64
  mlp_ratio: 4
  dropout: 0.0

  # Context
  context_length: 16          # Latent frames in history

  # Position encoding
  rope:
    type: "3d"
    base: 10000
    temporal_fraction: 0.333  # 1/3 dims for temporal

  # Attention
  attention:
    type: "sliding_tile"
    tile_size: 8
    global_heads: 8           # 1/4 of total heads

# DeltaV Predictor (100M params)
deltav:
  input_dim: 2048             # From dynamics
  depth_bins: 64
  voxel_features: 16
  max_deltas_per_frame: 4096
  confidence_threshold: 0.5

  # Operation types
  ops:
    remove: 0
    modify: 1
    add: 2

# OVoxel Memory
memory:
  resolution: 256             # 256³ max grid
  max_voxels: 50000000        # 50M voxels max
  dtype: "float16"

  # Features: RGB(3) + metallic(1) + roughness(1) + opacity(1) + SDF(1)
  feature_channels: 7

  # Pruning
  prune_interval: 100         # Frames between prune
  opacity_threshold: 0.01

  # SVO
  svo:
    max_depth: 8
    serialize: "z_order"      # Morton encoding

# CUDA Rasterizer
render:
  resolution: [1280, 720]     # 720p
  tile_size: 16
  max_voxels_per_tile: 256
  near: 0.1
  far: 100.0
  alpha_threshold: 0.99
  background: [0.1, 0.1, 0.1]

# Training
training:
  # Stage 1: Tokenizer
  stage1:
    epochs: 100
    batch_size: 32
    lr: 0.0001
    warmup_steps: 5000
    total_steps: 200000
    loss_weights:
      reconstruction: 1.0
      perceptual: 0.1
      fsq_commitment: 0.25

  # Stage 2: Dynamics + LAM
  stage2:
    epochs: 200
    batch_size: 16
    gradient_accumulation: 4
    lr: 0.00005
    warmup_steps: 10000
    total_steps: 500000
    loss_weights:
      next_frame: 1.0
      action_variance: 0.1
      temporal_consistency: 0.05

  # Stage 3: DeltaV
  stage3:
    epochs: 50
    batch_size: 8
    lr: 0.00002
    total_steps: 100000
    loss_weights:
      voxel_reconstruction: 1.0
      sparsity: 0.01
      render: 0.5

  # Stage 4: End-to-end
  stage4:
    epochs: 20
    batch_size: 4
    lr: 0.000001
    total_steps: 50000
    gradient_clip: 1.0
    loss_weights:
      lpips: 1.0
      consistency: 0.1
      stability: 0.05

  # Optimizer
  optimizer:
    type: "adamw"
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1e-8

  # Mixed precision
  amp:
    enabled: true
    dtype: "bfloat16"

# Inference
inference:
  target_fps: 24
  frame_budget_ms: 41.67      # 1000 / 24

  # Timing targets (ms)
  timing:
    action_encode: 1
    dynamics_forward: 15
    deltav_predict: 3
    memory_update: 2
    render: 20
    total: 41

# Data
data:
  # Stage 1-2: Video data
  video:
    datasets: ["webvid", "panda70m"]
    resolution: 256
    num_frames: 16
    fps: 8

  # Stage 3: 3D supervision
  synthetic:
    datasets: ["objaverse", "dl3dv"]
    voxel_resolution: 64
    num_views: 8

# Hardware
hardware:
  device: "cuda"
  gpu_memory: 24              # GB (RTX 4090)
  compile: true               # torch.compile
  channels_last: true
